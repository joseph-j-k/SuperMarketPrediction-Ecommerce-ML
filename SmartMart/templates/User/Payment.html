{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Gateway</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at 20% 20%, #6366f1, #312e81);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .gateway-card {
      width: 450px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .gateway-header {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      text-align: center;
      padding: 2rem;
    }

    .gateway-body {
      padding: 2rem;
    }

    .method-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 12px;
      padding: 0.75rem;
    }

    .method-btn.active {
      background: linear-gradient(135deg, #6366f1, #22c55e);
    }

    .form-control {
      border-radius: 12px;
      padding: 0.8rem;
    }

    .pay-btn {
      width: 100%;
      border-radius: 15px;
      padding: 1rem;
      background: linear-gradient(90deg, #10b981, #22c55e);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
    }

    .error-msg {
      color: #ffb4b4;
      font-weight: 600;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>

<body>

<form method="post" action="">
{% csrf_token %}

  <div class="gateway-card">

    <div class="gateway-header">
      <h2><i class="bi bi-shield-check me-2"></i>Secure Payment</h2>
      <p class="opacity-75 mb-0">Fast • Encrypted • Trusted</p>
    </div>

    <div class="gateway-body">

      <!-- Order Summary -->
      <div class="d-flex justify-content-between align-items-center mb-4 bg-white text-dark rounded-4 p-3">
        <strong>Order Total</strong>
        <h5 class="text-success mb-0">₹ {{ order.total_amount }}</h5>
      </div>

      <!-- Payment Methods -->
      <div class="d-flex justify-content-between mb-4">
        <button type="button" class="method-btn active flex-fill me-2">
          <i class="bi bi-credit-card"></i>
        </button>
        <button type="button" class="method-btn flex-fill me-2">
          <i class="bi bi-paypal"></i>
        </button>
        <button type="button" class="method-btn flex-fill">
          <i class="bi bi-lightning-charge-fill"></i>
        </button>
      </div>

      <!-- Card Fields -->
      <div>
        <input type="text" id="cardName" class="form-control mb-3" placeholder="Name on Card">

        <input type="text" id="cardNumber" class="form-control mb-3" placeholder="Card Number" maxlength="16">

        <div class="row">
          <div class="col-6">
            <input type="text" id="expiry" class="form-control" placeholder="MM/YY">
          </div>
          <div class="col-6">
            <input type="password" id="cvv" class="form-control" placeholder="CVV" maxlength="3">
          </div>
        </div>
      </div>

      <!-- Error Message -->
      <div id="errorMsg" class="error-msg"></div>

      <!-- Submit -->
      <button type="submit" class="pay-btn mt-4">
        <i class="bi bi-lock-fill me-2"></i>
        Pay ₹ {{ order.total_amount }}
      </button>

      <p class="text-center mt-3 small opacity-75">
        By continuing, you agree to our terms.
      </p>

    </div>
  </div>

</form>

<!-- VALIDATION SCRIPT -->
<script>
  const form = document.querySelector("form");
  const cardName = document.getElementById("cardName");
  const cardNumber = document.getElementById("cardNumber");
  const expiry = document.getElementById("expiry");
  const cvv = document.getElementById("cvv");
  const errorMsg = document.getElementById("errorMsg");

  form.addEventListener("submit", function (e) {
    errorMsg.innerText = "";

    if (cardName.value.trim() === "") {
      errorMsg.innerText = "Please enter the name on the card.";
      e.preventDefault();
      return;
    }

    if (!/^\d{16}$/.test(cardNumber.value)) {
      errorMsg.innerText = "Card number must be 16 digits.";
      e.preventDefault();
      return;
    }

    if (!/^\d{2}\/\d{2}$/.test(expiry.value)) {
      errorMsg.innerText = "Expiry date must be in MM/YY format.";
      e.preventDefault();
      return;
    }

    const [month, year] = expiry.value.split("/").map(Number);
    const now = new Date();
    const currentYear = now.getFullYear() % 100;
    const currentMonth = now.getMonth() + 1;

    if (month < 1 || month > 12 || year < currentYear || (year === currentYear && month < currentMonth)) {
      errorMsg.innerText = "Card has expired.";
      e.preventDefault();
      return;
    }

    if (!/^\d{3}$/.test(cvv.value)) {
      errorMsg.innerText = "CVV must be 3 digits.";
      e.preventDefault();
      return;
    }
  });
</script>

</body>
</html>
