{% extends "Vendor/commons/base.html" %}
{% load static %}

{% block title %}
SmartMart | Add Product
{% endblock %}

{% block content %}

<style>
  .product-box {
    max-width: 520px;
    margin: 90px auto;
    padding: 30px 25px;
    border-radius: 16px;
    background: #ffffff;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
  }

  .product-title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 15px;
    color: #222;
  }

  .form-label {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 6px;
    color: #555;
    text-align: left;
    display: block;
  }

  .form-control {
    border-radius: 12px;
    padding: 11px 14px;
    border: 1px solid #d0d0ff;
    margin-bottom: 12px;
  }

  .form-control:focus {
    border-color: #6c63ff;
    box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
  }

  .btn-submit {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    background: #6c63ff;
    border-radius: 30px;
    color: white;
    border: none;
    transition: 0.3s;
  }

  .btn-submit:hover {
    background: #4b47d6;
    transform: scale(1.05);
  }
</style>

{% if message %}
<script>
  alert("{{ message|escapejs }}");
  window.location = "{% url 'vendor:product_list' %}";
</script>
{% endif %}

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}

  <div class="product-box">

    <div class="product-title">Add Product</div>

    <label class="form-label">Category</label>
    <select class="form-control" name="category_id" id="category_id" required>
      <option disabled selected>-- Select Category --</option>
      {% for c in category %}
        <option value="{{ c.id }}">{{ c.category_name }}</option>
      {% endfor %}
    </select>

    <label class="form-label">Subcategory</label>
    <select class="form-control" name="subcategory_id" id="subcategory_id" required>
      <option value="">-- Select Subcategory --</option>
    </select>

    <label class="form-label">Product Name</label>
    <input class="form-control" name="product_name" required>

    <label class="form-label">Price</label>
    <input class="form-control" type="number" step="0.01" name="price" required>

    <label class="form-label">Stock</label>
    <input class="form-control" type="number" name="stock" required>

    <label class="form-label">Description</label>
    <textarea class="form-control" name="description" rows="3" required></textarea>

    <label class="form-label">Product Image</label>
    <input class="form-control" type="file" name="product_image">

    <button class="btn-submit">Save Product</button>

  </div>

</form>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#category_id").change(function () {
        var did = $(this).val();
        var ur = "{% url 'vendor:ajax_subcategory' %}";
        $.ajax({
            url: ur,
            data: { did: did },
            success: function (data) {
                $("#subcategory_id").html(data);
            },
        });
    });
</script>

{% endblock %}
