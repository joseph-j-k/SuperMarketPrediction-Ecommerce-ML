{% extends "Vendor/commons/base.html" %}
{% load static %}

{% block title %}
SmartMart | Change Password
{% endblock %}

{% block content %}

<!-- FONT AWESOME CDN (Required for eye icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
  .cp-box {
    max-width: 520px;
    margin: 90px auto;
    padding: 30px 25px;
    border-radius: 16px;
    background: #ffffff;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
  }

  .cp-title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 15px;
    color: #222;
  }

  .cp-label {
    font-weight: 600;
    color: #444;
  }

  .btn-save {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    font-weight: 600;
    border-radius: 30px;
  }

  .btn-cancel {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-weight: 600;
    border-radius: 30px;
  }

  .password-field {
    position: relative;
  }

  .toggle-eye {
    position: absolute;
    top: 45px;
    right: 12px;
    font-size: 18px;
    transform: translateY(-50%);
    cursor: pointer;
    color: #999;
  }
</style>


<div class="cp-box">
{% if message %}
<script>
  alert("{{ message|escapejs }}");
  window.location = "{% url 'vendor:profile' %}";
</script>
{% endif %}

  <!-- TITLE -->
  <h2 class="cp-title">Change Password</h2>

  <!-- FORM -->
  <form method="post">
    {% csrf_token %}

    <div class="form-group mt-3 password-field">
      <label class="cp-label">Old Password</label>
      <input class="form-control" type="password" id="old_password" name="old_password" required>
      <i class="fa fa-eye toggle-eye" onclick="togglePassword('old_password', this)"></i>
    </div>

    <div class="form-group mt-3 password-field">
      <label class="cp-label">New Password</label>
      <input class="form-control" type="password" id="new_password" name="new_password" required>
      <i class="fa fa-eye toggle-eye" onclick="togglePassword('new_password', this)"></i>
    </div>

    <div class="form-group mt-3 password-field">
      <label class="cp-label">Confirm Password</label>
      <input class="form-control" type="password" id="confirm_password" name="confirm_password" required>
      <i class="fa fa-eye toggle-eye" onclick="togglePassword('confirm_password', this)"></i>
    </div>

    <button type="submit" class="btn btn-primary btn-save">
      Save Password
    </button>

    <a href="{% url 'vendor:profile' %}">
      <button type="button" class="btn btn-secondary btn-cancel">
        Cancel
      </button>
    </a>

  </form>

</div>


<!-- PASSWORD VISIBILITY SCRIPT -->
<script>
  function togglePassword(fieldId, iconElement) {
    var field = document.getElementById(fieldId);

    if (field.type === "password") {
      field.type = "text";
      iconElement.classList.remove("fa-eye");
      iconElement.classList.add("fa-eye-slash");
    } else {
      field.type = "password";
      iconElement.classList.remove("fa-eye-slash");
      iconElement.classList.add("fa-eye");
    }
  }
</script>

{% endblock %}
