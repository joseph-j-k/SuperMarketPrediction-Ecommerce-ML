{% extends "Vendor/commons/base.html" %}
{% load static %}

{% block title %}
SmartMart | Edit Profile
{% endblock %}

{% block content %}

<style>
  .edit-box {
    max-width: 520px;
    margin: 90px auto;
    padding: 30px 25px;
    border-radius: 16px;
    background: #ffffff;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
  }

  .edit-title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 15px;
    color: #222;
  }

  .edit-img {
    width: 120px;
    height: 120px;
    margin: auto;
    border-radius: 100%;
    border: 3px solid #6c63ff;
    object-fit: cover;
    display: block;
    margin-bottom: 10px;
  }

  .btn-save {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    font-weight: 600;
    border-radius: 30px;
  }

  .btn-cancel {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-weight: 600;
    border-radius: 30px;
  }
</style>


<div class="edit-box">
{% if message %}
<script>
  alert("{{ message|escapejs }}");
  window.location = "{% url 'vendor:profile' %}";
</script>
{% endif %}
  <!-- TITLE -->
  <h2 class="edit-title">Edit Profile</h2>

  <!-- IMAGE -->
  {% if vendor.seller_photo %}
    <img src="{{ vendor.seller_photo.url }}" class="edit-img">
  {% else %}
      <img src="{% static 'images/default_profile.jpg' %}" class="edit-img">
  {% endif %}

  <!-- FORM -->
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-group mt-3">
      <label>Full Name</label>
      <input class="form-control" type="text" name="full_name" value="{{ vendor.seller_name }}" required>
    </div>

    <div class="form-group mt-3">
      <label>Email</label>
      <input class="form-control" type="email" name="email" value="{{ vendor.seller_email }}" required>
    </div>

    <div class="form-group mt-3">
      <label>Contact</label>
      <input class="form-control" type="text" name="contact" value="{{ vendor.seller_contact }}" required>
    </div>

    <div class="form-group mt-3">
      <label>Address</label>
      <textarea class="form-control" name="address" required>{{ vendor.seller_address }}</textarea>
    </div>

    <div class="form-group mt-3">
      <label>District</label>
      <input class="form-control" value="{{ vendor.place.district.district_name }}" readonly>
    </div>

    <div class="form-group mt-3">
      <label>Place</label>
      <input class="form-control" value="{{ vendor.place.place_name }}" readonly>
    </div>

    <div class="form-group mt-3">
      <label>Change Profile Photo</label>
      <input class="form-control" type="file" name="photo">
    </div>

    <button type="submit" class="btn btn-primary btn-save">Save Changes</button>

    <a href="{% url 'vendor:profile' %}">
      <button type="button" class="btn btn-secondary btn-cancel">Cancel</button>
    </a>

  </form>

</div>

{% endblock %}
